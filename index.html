<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>人数オープン風 数字演出</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="stage">
    <h1>正解は・・・？</h1>
    <p class="sub"></p>

    <div class="controls">
      <div class="input-wrap">
        <label for="priceInput">人数</label>
          <input
            id="priceInput"
            type="password"
            inputmode="numeric"
            pattern="[0-9]*"
            value="120"
          />
      </div>
      <div class="button-wrap">
        <button id="spinBtn">回転する</button>
        <button id="revealBtn">開示する</button>
      </div>
    </div>

    <div class="board">
      <div class="lights" id="lights"></div>
      <div class="display" id="display"></div>
      <div class="flash" id="flash"></div>
    </div>

    <div class="message" id="message"></div>
    <div class="hint"></div>
  </div>

  <script src="script.js"></script>
</body>
</html>
